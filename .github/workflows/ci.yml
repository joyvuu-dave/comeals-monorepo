name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ruby-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - run: bundle exec rubocop

  ruby-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: comeals_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/comeals_test
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Create frontend build stubs
        run: |
          mkdir -p app/frontend/dist
          echo '<!DOCTYPE html><html><head></head><body><div id="root"></div></body></html>' > app/frontend/dist/index.html
          mkdir -p public/.vite
          echo '{}' > public/.vite/manifest.json
      - run: bin/rails db:schema:load
      - run: bundle exec rake

  node-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint

  node-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test

  node-e2e-tests:
    runs-on: ubuntu-latest
    env:
      VITE_PUSHER_KEY: "test-key-for-ci"
      VITE_PUSHER_CLUSTER: "us2"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7

  integration-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: comeals_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/comeals_test
      VITE_PUSHER_KEY: "test-key-for-ci"
      VITE_PUSHER_CLUSTER: "us2"
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      # Load the schema the same way ruby-test does. On a fresh empty
      # database, db:prepare inside bin/test-integration would instead
      # replay every migration from zero and re-dump structure.sql.
      - run: bin/rails db:schema:load
      - run: bin/test-integration
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-integration-report
          path: test-results/
          retention-days: 7
